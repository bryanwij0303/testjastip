<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice - Titiport Jastip</title>
<style>
  * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { margin: 0; background: #f5f5f5; color: #222; padding: 20px; }
  .sheet { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  h1 { color: #111827; margin: 0; font-size: 24px; }
  .brand { color: #2563eb; font-weight: 700; }
  .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
  .block label { display: block; font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
  .block div { font-size: 14px; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 14px; }
  th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e5e7eb; }
  th { background: #f9fafb; color: #6b7280; font-weight: 600; font-size: 12px; text-transform: uppercase; }
  .right { text-align: right; }
  .total-bar { display: flex; justify-content: flex-end; margin-top: 20px; }
  .total-box { width: 260px; background: #111827; color: #fff; padding: 16px; border-radius: 6px; }
  .total-box div { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .total-box .grand { margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.15); font-weight: 700; }
  .actions { margin-top: 30px; display: flex; gap: 10px; justify-content: flex-end; }
  button { background: #2563eb; color: #fff; border: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; cursor: pointer; }
  button.secondary { background: #e5e7eb; color: #111827; }
  .no-print { }
  @media print { .no-print { display: none; } body { background: #fff; padding: 0; } .sheet { box-shadow: none; padding: 20px; } }
</style>
</head>
<body>
  <div class="sheet">
    <div style="display:flex;justify-content:space-between;align-items:end;gap:10px;flex-wrap:wrap;">
      <div>
        <div class="brand">TITIPORT</div>
        <div style="font-size:12px;color:#6b7280;margin-top:4px;">Jastip China Taobao</div>
      </div>
      <div class="right">
        <div style="font-size:12px;color:#6b7280;">INVOICE</div>
        <div style="font-size:18px;font-weight:700;">#<span id="invNo">---</span></div>
      </div>
    </div>

    <div class="meta">
      <div class="block">
        <label>Customer</label>
        <div id="custName">---</div>
      </div>
      <div class="block">
        <label>WhatsApp</label>
        <div id="custWa">---</div>
      </div>
      <div class="block">
        <label>Date</label>
        <div id="invDate">---</div>
      </div>
      <div class="block">
        <label>Status</label>
        <div id="invStatus">---</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th class="right">Qty</th>
          <th class="right">Price</th>
          <th class="right">Total</th>
        </tr>
      </thead>
      <tbody id="items"></tbody>
    </table>

    <div class="total-bar">
      <div class="total-box">
        <div><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
        <div><span>Fee</span><span id="fee">Rp 0</span></div>
        <div class="grand"><span>Grand Total</span><span id="grand">Rp 0</span></div>
      </div>
    </div>

    <div class="actions no-print">
      <button class="secondary" onclick="window.print()">Print / Save PDF</button>
      <button onclick="window.close()">Tutup</button>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const data = {
    invoice_no: params.get('invoice_no') || '',
    customer_name: params.get('customer_name') || '',
    wa: params.get('wa') || '',
    date: params.get('date') || '',
    status: params.get('status') || 'menunggu',
    currency: params.get('currency') || 'CNY',
    rate: Number(params.get('rate') || '0'),
    items: JSON.parse(params.get('items') || '[]')
  };

  document.getElementById('invNo').textContent = data.invoice_no || 'NEW';
  document.getElementById('custName').textContent = data.customer_name || '---';
  document.getElementById('custWa').textContent = data.wa || '---';
  document.getElementById('invDate').textContent = data.date || new Date().toLocaleDateString('id-ID');
  document.getElementById('invStatus').textContent = data.status || 'menunggu';

  const feeRate = 0.08;
  const fmt = (n) => 'Rp ' + Math.round(n || 0).toLocaleString('id-ID');
  const rows = (data.items || []).map((it, idx) => {
    const priceIdr = Number(it.price_idr || 0);
    const qty = Number(it.qty || 1);
    const total = priceIdr * qty;
    return `<tr>
      <td>${idx+1}. ${it.name || 'Item'}</td>
      <td class="right">${qty}</td>
      <td class="right">${fmt(priceIdr)}</td>
      <td class="right">${fmt(total)}</td>
    </tr>`;
  }).join('');

  document.getElementById('items').innerHTML = rows;

  const subtotal = (data.items || []).reduce((a, b) => a + (Number(b.price_idr || 0) * Number(b.qty || 1)), 0);
  const fee = subtotal * feeRate;
  const grand = subtotal + fee;

  document.getElementById('subtotal').textContent = fmt(subtotal);
  document.getElementById('fee').textContent = fmt(fee);
  document.getElementById('grand').textContent = fmt(grand);

  if (!window.location.search) {
    document.getElementById('items').innerHTML = `<tr><td colspan="4">Tidak ada data invoice. Gunakan parameter: invoice_no, customer_name, wa, date, status, rate, items=[{"name":"...", "qty":1, "price_idr":10000}]</td></tr>`;
    document.getElementById('subtotal').textContent = 'Rp 0';
    document.getElementById('fee').textContent = 'Rp 0';
    document.getElementById('grand').textContent = 'Rp 0';
  }
</script>
</body>
</html>
